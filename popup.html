<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: Arial, sans-serif;
      color: #1f2933;
    }
    h2 {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 10px;
      color: #128C7E;
      font-size: 18px;
    }
    .titleIcon {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
    }
    p {
      margin: 0;
      font-size: 13px;
      line-height: 1.4;
    }
    #versionNotice {
      display: none;
      margin: 0 0 12px;
      padding: 8px 10px;
      border-radius: 4px;
      background-color: #FFF8E1;
      color: #8A5A00;
      font-size: 12px;
      line-height: 1.4;
    }
    #versionNotice a {
      color: #1976D2;
      text-decoration: none;
      font-weight: bold;
    }
    #versionNotice a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h2><img class="titleIcon" src="icons/whatsapp-48.png" alt="" />Tel2WhatsApp</h2>
  <div id="versionNotice"></div>
  <p>Highlight a phone number or right-click a tel link, then choose <strong>Open in WhatsApp</strong>.</p>
  <script src="version-check.js"></script>
  <script src="popup.js"></script>
</body>
</html>
